<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Breakout PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#222">
    <style>
        body { margin: 0; background: #222; color: white; overflow: hidden; font-family: sans-serif; text-align: center; }
        canvas { background: #000; display: block; margin: 0 auto; touch-action: none; border-bottom: 5px solid #444; }
        .info { padding: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="info">Score: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 60;

        let score = 0, x = canvas.width/2, y = canvas.height-30, dx = 3, dy = -3;
        const ballRadius = 10, paddleHeight = 15, paddleWidth = 100;
        let paddleX = (canvas.width-paddleWidth)/2;
        
        const rowCount = 5, colCount = Math.floor(canvas.width/75), brickW = 65, brickH = 20, padding = 10, offsetTop = 30, offsetLeft = 10;
        const bricks = [];
        for(let c=0; c<colCount; c++) {
            bricks[c] = [];
            for(let r=0; r<rowCount; r++) { bricks[c][r] = { x: 0, y: 0, status: 1 }; }
        }

        document.addEventListener("mousemove", (e) => { paddleX = e.clientX - paddleWidth/2; });
        document.addEventListener("touchmove", (e) => { paddleX = e.touches[0].clientX - paddleWidth/2; e.preventDefault(); }, {passive: false});

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Balle
            ctx.beginPath(); ctx.arc(x, y, ballRadius, 0, Math.PI*2); ctx.fillStyle = "#0095DD"; ctx.fill(); ctx.closePath();
            // Raquette
            ctx.fillStyle = "#0095DD"; ctx.fillRect(paddleX, canvas.height-paddleHeight, paddleWidth, paddleHeight);
            
            // Briques
            for(let c=0; c<colCount; c++) {
                for(let r=0; r<rowCount; r++) {
                    if(bricks[c][r].status == 1) {
                        let bx = (c*(brickW+padding))+offsetLeft, by = (r*(brickH+padding))+offsetTop;
                        bricks[c][r].x = bx; bricks[c][r].y = by;
                        ctx.fillStyle = `hsl(${r * 40}, 70%, 50%)`;
                        ctx.fillRect(bx, by, brickW, brickH);
                        if(x > bx && x < bx+brickW && y > by && y < by+brickH) { dy = -dy; bricks[c][r].status = 0; score++; scoreEl.innerText = score; }
                    }
                }
            }

            if(x + dx > canvas.width-ballRadius || x + dx < ballRadius) dx = -dx;
            if(y + dy < ballRadius) dy = -dy;
            else if(y + dy > canvas.height-ballRadius) {
                if(x > paddleX && x < paddleX + paddleWidth) dy = -dy;
                else { document.location.reload(); }
            }
            x += dx; y += dy;
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
